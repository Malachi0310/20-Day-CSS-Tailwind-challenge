<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Nav Bar challenge!</title>
</head>
<body>
    <div class="w-full h-16 bg-slate-900 flex justify-between items-center px-4">
        <p class="text-white font-bold">LOGO</p>
        <div class="flex gap-6">
            <p class="text-gray-300 hover:text-white cursor-pointer">Home</p>
            <p class="text-gray-300 hover:text-white cursor-pointer">About</p>
            <p class="text-gray-300 hover:text-white cursor-pointer">Contact</p>
        </div>

    </div>

    <div class="flex flex-col items-center w-full h-20 2 mt-10 bg-white">

        <div class="w-3/4 h-16 bg-blue-400"></div>
        <div class="w-3/4 h-16 bg-blue-600"></div>
        <div class="w-3/4 h-16 bg-blue-800"></div>

    </div>

    <div class="flex flex-col items-center justify-center md:flex-row w-full mt-10">
        <div class="w-20 h-20 bg-red-500 "></div>
        <div class="w-20 h-20 bg-blue-500"></div>

    </div>

    
</body>
</html>

<!-- 🔹 Flexbox Basics
flex → turns a container into a flexbox (activates layout control)
flex-row → horizontal layout (default)
flex-col → vertical layout (stack items)

🔹 Alignment (2 Axes)
Main Axis (justify-)
justify-center → center items
justify-between → push items to edges
justify-around / justify-evenly → equal spacing
Cross Axis (items-)
items-center → center items perpendicular to flow

🔹 Pro Utilities
gap-{n} → clean spacing between items (better than margins)
px-{n} → horizontal padding
py-{n} → vertical padding

🔹 Responsive Design
Mobile-first approach
Use breakpoints like:
md: (tablet)
lg: (desktop)

👉 Example:

flex-col md:flex-row
→ stack on phone, row on larger screens

🔹 Clean Code Habits
Use valid spacing scale (e.g. w-4, h-16, not h-15)
Add interactivity:
hover: → hover effects
cursor-pointer → clickable feel -->
